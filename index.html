<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tour De Wonder | Kashmir Travel Packages, Houseboats, Treks & Hotels</title>
    <meta name="description" content="Discover Kashmir with Tour De Wonder. Book houseboats on Dal Lake, trekking packages, affordable vacation bundles, and top hotels. Best travel agency in Srinagar, J&K." />
    <meta name="author" content="Tour De Wonder" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tourdewonder.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Tour De Wonder | Kashmir Travel Packages & Tours" />
    <meta property="og:description" content="Book houseboats on Dal Lake, trekking packages, affordable vacation bundles, and top hotels in Kashmir. Best travel agency in Srinagar." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tourdewonder.com/" />
    <meta property="og:image" content="https://tourdewonder.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Tour De Wonder - Kashmir travel packages, houseboats, treks and hotels" />
    <meta property="og:site_name" content="Tour De Wonder" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TourdeWonder" />
    <meta name="twitter:title" content="Tour De Wonder | Kashmir Travel Packages & Tours" />
    <meta name="twitter:description" content="Book houseboats on Dal Lake, trekking packages, affordable vacation bundles, and top hotels in Kashmir." />
    <meta name="twitter:image" content="https://tourdewonder.com/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- JSON-LD: TravelAgency -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Tour De Wonder",
      "url": "https://tourdewonder.com",
      "logo": "https://tourdewonder.com/favicon.ico",
      "description": "Your trusted travel partner for exploring the breathtaking beauty of Kashmir, Ladakh, and beyond.",
      "telephone": "+91-6006-288256",
      "email": "tourdewonder89@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Srinagar",
        "addressRegion": "Jammu & Kashmir",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "34.0837",
        "longitude": "74.7973"
      },
      "areaServed": ["Kashmir", "Ladakh", "Srinagar", "Gulmarg", "Pahalgam", "Sonamarg"],
      "sameAs": ["https://www.instagram.com/tourdewonder/"],
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
        "opens": "00:00",
        "closes": "23:59"
      }
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Tour De Wonder",
      "url": "https://tourdewonder.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://tourdewonder.com/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
